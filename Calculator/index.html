<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>241910 Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="title">Calculator</div>
        <div class="calculator">
            <div class="display">241910</div>
            <div class="buttons">
                <button class="button operator">%</button>
                <button class="button operator">√</button>
                <button class="button clear ce">CE</button>
                <button class="button clear c">C</button>
                <button class="button">7</button>
                <button class="button">8</button>
                <button class="button">9</button>
                <button class="button operator">-</button>
                <button class="button">4</button>
                <button class="button">5</button>
                <button class="button">6</button>
                <button class="button operator">/</button>
                <button class="button">1</button>
                <button class="button">2</button>
                <button class="button">3</button>
                <button class="button operator">&times;</button>
                <button class="button">.</button>
                <button class="button">0</button>
                <button class="button equal">=</button>
                <button class="button operator">+</button>
            </div>
        </div>
    </div>
</body>
</html>
